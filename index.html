<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slots-game 原创游戏 定制素材 ab站 包链接  出海</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .waterfall-container {
            column-count: 1;
            column-gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 600px) {
            .waterfall-container {
                column-count: 2;
            }
        }

        @media (min-width: 900px) {
            .waterfall-container {
                column-count: 3;
            }
        }

        @media (min-width: 1200px) {
            .waterfall-container {
                column-count: 4;
            }
        }

        .img-card {
            break-inside: avoid;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            background-color: white;
        }

        .img-card:hover {
            transform: translateY(-5px);
        }

        .game-img {
            width: 100%;
            display: block;
            object-fit: cover;
            height: auto;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .no-more {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        .contact-link {
            text-align: center;
            display: block;
            margin-bottom: 20px;
            font-size: 18px;
            color: #0066cc;
            text-decoration: none;
        }
        
        .contact-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>slots-game 原创游戏 定制素材 ab站 包链接  出海  777  slots</h1>
    <a href="https://t.me/GoogleAppGoOnline" class="contact-link">点击这里飞机联系我</a>
    <div class="waterfall-container" id="waterfallContainer"></div>
    <div class="loading" id="loading"></div>
    <div class="no-more" id="noMore" style="display: none;"></div>

    <script>
        const container = document.getElementById('waterfallContainer');
        const loading = document.getElementById('loading');
        const noMore = document.getElementById('noMore');
        
        let imgNumber = 1;
        let isLoading = false;

        async function loadImage() {
            if (isLoading) return;
            isLoading = true;

            try {
                const img = new Image();
                img.src = `${imgNumber}.png`;
                
                img.onload = function() {
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    
                    const imgElement = document.createElement('img');
                    imgElement.className = 'game-img';
                    imgElement.src = img.src;
                    imgElement.alt = `小游戏截图 ${imgNumber}`;
                    imgElement.loading = 'lazy';

                    card.appendChild(imgElement);
                    container.appendChild(card);

                    imgNumber++;
                    isLoading = false;
                    loadImage();
                };

                img.onerror = function() {
                    loading.style.display = 'none';
                    noMore.style.display = 'block';
                    isLoading = false;
                };
            } catch (error) {
                console.error('加载图片出错:', error);
                loading.style.display = 'none';
                noMore.style.display = 'block';
                isLoading = false;
            }
        }

        window.onload = function() {
            loadImage();
        };
    </script>
</body>
</html>
